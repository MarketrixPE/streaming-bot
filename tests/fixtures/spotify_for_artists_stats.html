<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><title>Spotify for Artists · Stats</title></head>
<body>
  <header><nav>Home · Music · Stats · Audience</nav></header>
  <main>
    <section class="Banner" role="alert">
      <h3>Heads up</h3>
      <p>
        Some streams may have been filtered as part of our anti-fraud process.
        We do this to protect royalty payouts for all artists.
      </p>
    </section>

    <section class="streams-card">
      <span class="label">Streams (28d)</span>
      <div data-testid="streams-28-day">
        <span data-testid="value">12,300</span>
      </div>
    </section>

    <section class="listeners-card">
      <span class="label">Monthly Listeners</span>
      <div data-testid="monthly-listeners">
        <span data-testid="value">5,400</span>
      </div>
    </section>
  </main>
</body>
</html>
