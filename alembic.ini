; Configuración de Alembic. La DSN se inyecta vía ENV var DATABASE_URL para
; evitar credenciales en el repo. Soporta tanto postgres+asyncpg como
; sqlite+aiosqlite (este último útil para integración local).

[alembic]
script_location = alembic
prepend_sys_path = src
version_path_separator = os
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
