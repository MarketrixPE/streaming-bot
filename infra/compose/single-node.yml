# Compose para deployment single-node en workstation propia.
# Combina data-plane + control-plane + workers en un solo host con resource
# limits ajustados a Intel Ultra 9 285K + 96GB RAM + RTX 5090.
# Ver docs/operations/single-node-deployment.md para setup completo.

services:
  # ============================================================
  # PERSISTENCIA
  # ============================================================
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /var/lib/streaming-bot/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - shared_buffers=8GB
      - -c
      - effective_cache_size=24GB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - max_connections=300
      - -c
      - max_wal_size=8GB
      - -c
      - wal_compression=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - jit=off
      - -c
      - random_page_cost=1.1
    deploy:
      resources:
        limits:
          memory: 16G
          cpus: "6"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - /var/lib/streaming-bot/clickhouse:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/00-overrides.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/00-users.xml:ro
    deploy:
      resources:
        limits:
          memory: 24G
          cpus: "8"
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 4gb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - /var/lib/streaming-bot/redis:/data
    deploy:
      resources:
        limits:
          memory: 5G
          cpus: "2"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ============================================================
  # WORKFLOW ENGINE
  # ============================================================
  temporal:
    image: temporalio/auto-setup:1.25
    container_name: temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DBNAME: ${TEMPORAL_DB}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_DB}
      ENABLE_ES: "false"
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2"
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  temporal-ui:
    image: temporalio/ui:2.31
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    deploy:
      resources:
        limits:
          memory: 512M

  # ============================================================
  # OBJECT STORAGE
  # ============================================================
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /var/lib/streaming-bot/minio:/data
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ============================================================
  # OBSERVABILIDAD
  # ============================================================
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=10GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus-single-node.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - /var/lib/streaming-bot/prometheus:/prometheus
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /var/lib/streaming-bot/alertmanager:/alertmanager
    deploy:
      resources:
        limits:
          memory: 256M

  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - /var/lib/streaming-bot/loki:/loki
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  tempo:
    image: grafana/tempo:2.7.0
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - /var/lib/streaming-bot/tempo:/var/tempo
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "0.5"

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel,grafana-clickhouse-datasource
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor,publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /var/lib/streaming-bot/grafana:/var/lib/grafana
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "1"

  # ============================================================
  # CLOUDFLARE TUNNEL (publica dashboard sin abrir puertos)
  # ============================================================
  cloudflared:
    image: cloudflare/cloudflared:2025.4.0
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel run --token ${TUNNEL_TOKEN}
    environment:
      TUNNEL_TOKEN: ${TUNNEL_TOKEN}
    deploy:
      resources:
        limits:
          memory: 256M

  # ============================================================
  # APP LAYER (API + Workers + Dashboard)
  # NOTA: estos se construyen desde codigo local (build).
  # En multi-nodo se usan imagenes ghcr.io pre-build.
  # ============================================================
  api:
    image: streaming-bot/api:local
    build:
      context: ../..
      dockerfile: Dockerfile
      target: api
    container_name: api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SB_API__HOST: 0.0.0.0
      SB_API__PORT: "8000"
      SB_OBSERVABILITY__METRICS_PORT: "9091"
    ports:
      - "127.0.0.1:8000:8000"
      - "127.0.0.1:9091:9091"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  temporal-worker:
    image: streaming-bot/worker:local
    build:
      context: ../..
      dockerfile: Dockerfile
      target: temporal-worker
    container_name: temporal-worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SB_TEMPORAL_HOST: temporal:7233
      SB_OBSERVABILITY__METRICS_PORT: "9092"
    ports:
      - "127.0.0.1:9092:9092"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  worker:
    image: streaming-bot/worker:local
    build:
      context: ../..
      dockerfile: Dockerfile
      target: worker
    restart: unless-stopped
    depends_on:
      temporal:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ../../.env
    environment:
      SB_TEMPORAL_HOST: temporal:7233
      SB_BROWSER__HEADLESS: "true"
    deploy:
      replicas: 30  # con 96GB RAM y 24c, soporta hasta 60. Empieza con 30.
      resources:
        limits:
          memory: 800M
          cpus: "0.6"
    shm_size: 2gb  # patchright/playwright requiere /dev/shm grande
    cap_add:
      - SYS_ADMIN  # chrome sandbox

  dashboard:
    image: streaming-bot/dashboard:local
    build:
      context: ../../dashboard
      dockerfile: Dockerfile
    container_name: dashboard
    restart: unless-stopped
    env_file:
      - ../../dashboard/.env.local
    environment:
      NODE_ENV: production
      PORT: "3000"
    ports:
      - "127.0.0.1:3000:3000"
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2"

  # ============================================================
  # GPU SERVICES (RTX 5090)
  # Habilitar solo cuando tengas modelos descargados (opcional)
  # ============================================================
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: ollama
  #   restart: unless-stopped
  #   volumes:
  #     - /var/lib/streaming-bot/ollama:/root/.ollama
  #   ports:
  #     - "127.0.0.1:11434:11434"
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 8G
  #       reservations:
  #         devices:
  #           - driver: nvidia
  #             count: all
  #             capabilities: [gpu]

  # ============================================================
  # NODE EXPORTER (metricas host)
  # ============================================================
  node-exporter:
    image: prom/node-exporter:v1.9.0
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    command:
      - --path.rootfs=/host
    volumes:
      - /:/host:ro,rslave
    deploy:
      resources:
        limits:
          memory: 128M
