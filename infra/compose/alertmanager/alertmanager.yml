global:
  resolve_timeout: 5m

route:
  receiver: ops_telegram
  group_by: ["alertname", "cluster", "severity"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - matchers:
        - severity = critical
      receiver: ops_pagerduty
      continue: true

receivers:
  - name: ops_telegram
    webhook_configs:
      - url: ${ALERTMANAGER_TELEGRAM_WEBHOOK:-http://localhost:9999/none}
        send_resolved: true

  - name: ops_pagerduty
    pagerduty_configs:
      - routing_key: ${PAGERDUTY_ROUTING_KEY:-CHANGE_ME}
        send_resolved: true

inhibit_rules:
  - source_matchers: ["severity = critical"]
    target_matchers: ["severity = warning"]
    equal: ["alertname", "cluster"]
