global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: streaming-bot
    env: production
    deployment: single-node

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: streaming-bot-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:9091"]
        labels:
          component: api

  - job_name: streaming-bot-temporal-worker
    metrics_path: /metrics
    static_configs:
      - targets: ["temporal-worker:9092"]
        labels:
          component: temporal-worker

  - job_name: node
    static_configs:
      - targets: ["node-exporter:9100"]
        labels:
          host: workstation-home
