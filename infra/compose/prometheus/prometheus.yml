global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: streaming-bot
    env: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: streaming-bot-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.10.0.10:9091  # control plane API
        labels:
          component: api

  - job_name: streaming-bot-workers
    metrics_path: /metrics
    static_configs:
      - targets:
          - 10.10.0.30:9091
          - 10.10.0.30:9092
          - 10.10.0.30:9093
          - 10.10.0.30:9094
        labels:
          component: worker

  - job_name: postgres
    static_configs:
      - targets: ["postgres-exporter:9187"]

  - job_name: redis
    static_configs:
      - targets: ["redis-exporter:9121"]

  - job_name: node
    static_configs:
      - targets:
          - 10.10.0.10:9100
          - 10.10.0.20:9100
          - 10.10.0.30:9100
