services:
  # ──────────────────────────────────────────────────────────────────────
  # Persistencia
  # ──────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - /var/lib/streaming-bot/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    command:
      - postgres
      - -c
      - shared_buffers=8GB
      - -c
      - effective_cache_size=24GB
      - -c
      - work_mem=64MB
      - -c
      - max_connections=300
      - -c
      - max_wal_size=4GB
      - -c
      - wal_compression=on
      - -c
      - log_min_duration_statement=1000
      - -c
      - log_lock_waits=on
      - -c
      - jit=off
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 6

  clickhouse:
    image: clickhouse/clickhouse-server:24.10
    container_name: clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD}
      CLICKHOUSE_DB: ${CLICKHOUSE_DB}
      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: "1"
    volumes:
      - /var/lib/streaming-bot/clickhouse:/var/lib/clickhouse
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.d/00-overrides.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.d/00-users.xml:ro
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  redis:
    image: redis:7.4-alpine
    container_name: redis
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 4gb
      - --maxmemory-policy
      - allkeys-lru
      - --appendonly
      - "yes"
      - --appendfsync
      - everysec
    volumes:
      - /var/lib/streaming-bot/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ──────────────────────────────────────────────────────────────────────
  # Workflow engine
  # ──────────────────────────────────────────────────────────────────────
  temporal:
    image: temporalio/auto-setup:1.25
    container_name: temporal
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      POSTGRES_SEEDS: postgres
      DBNAME: ${TEMPORAL_DB}
      VISIBILITY_DBNAME: ${TEMPORAL_VISIBILITY_DB}
      ENABLE_ES: "false"
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    healthcheck:
      test: ["CMD-SHELL", "tctl --address temporal:7233 cluster health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10

  temporal-ui:
    image: temporalio/ui:2.31
    container_name: temporal-ui
    restart: unless-stopped
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000

  # ──────────────────────────────────────────────────────────────────────
  # Object storage
  # ──────────────────────────────────────────────────────────────────────
  minio:
    image: quay.io/minio/minio:RELEASE.2025-04-08T15-41-24Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - /var/lib/streaming-bot/minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ──────────────────────────────────────────────────────────────────────
  # Observabilidad: Prometheus + Grafana + Loki + Tempo + Alertmanager
  # ──────────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.1.0
    container_name: prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d
      - --storage.tsdb.retention.size=20GB
      - --web.enable-lifecycle
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/rules:/etc/prometheus/rules:ro
      - /var/lib/streaming-bot/prometheus:/prometheus

  alertmanager:
    image: prom/alertmanager:v0.28.0
    container_name: alertmanager
    restart: unless-stopped
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
      - --storage.path=/alertmanager
    volumes:
      - ./alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /var/lib/streaming-bot/alertmanager:/alertmanager

  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    restart: unless-stopped
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./loki/loki.yml:/etc/loki/loki.yml:ro
      - /var/lib/streaming-bot/loki:/loki

  tempo:
    image: grafana/tempo:2.7.0
    container_name: tempo
    restart: unless-stopped
    command: -config.file=/etc/tempo.yml
    volumes:
      - ./tempo/tempo.yml:/etc/tempo.yml:ro
      - /var/lib/streaming-bot/tempo:/var/tempo

  grafana:
    image: grafana/grafana:11.6.0
    container_name: grafana
    restart: unless-stopped
    depends_on:
      - prometheus
      - loki
      - tempo
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: grafana-clock-panel,grafana-piechart-panel,grafana-clickhouse-datasource
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor,publicDashboards
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - /var/lib/streaming-bot/grafana:/var/lib/grafana

# Sin networks declaradas: docker compose crea una bridge default. Los
# servicios se hablan por nombre (postgres, redis, etc.). El acceso entre
# nodos se hace via WireGuard mesh + bind a 10.10.0.X publicado por
# docker-compose override (ver docker-compose.override.yml por nodo).
