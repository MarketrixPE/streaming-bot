#cloud-config
# Bootstrap minimo: paquetes base, hardening basico, docker + wireguard.
# Para hardening completo (LUKS, fail2ban, auditd) ver runbook ops/.

package_update: true
package_upgrade: true

packages:
  - curl
  - ca-certificates
  - gnupg
  - lsb-release
  - jq
  - htop
  - tmux
  - wireguard
  - ufw
  - fail2ban
  - unattended-upgrades
  - apt-transport-https

runcmd:
  # Docker
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
  - chmod a+r /etc/apt/keyrings/docker.gpg
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
    https://download.docker.com/linux/ubuntu $(lsb_release -cs) stable" > /etc/apt/sources.list.d/docker.list
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - systemctl enable --now docker

  # Hardening minimo
  - sysctl -w net.ipv4.ip_forward=1
  - echo "net.ipv4.ip_forward=1" >> /etc/sysctl.conf
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 51820/udp
  - ufw --force enable
  - systemctl enable --now fail2ban

  # Cloudflared (Cloudflare Tunnel)
  - mkdir -p /etc/cloudflared
  - curl -L https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb -o /tmp/cloudflared.deb
  - dpkg -i /tmp/cloudflared.deb || true

  # Estructura
  - mkdir -p /opt/streaming-bot/infra
  - mkdir -p /var/lib/streaming-bot
